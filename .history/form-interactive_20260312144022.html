<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="./css/reset.css" />
        <link rel="stylesheet" href="./css/style.css" />
        <title>Register</title>
    </head>
    <body>
        <form action="" class="form">
            <h1 class="form-heading">Register</h1>
            <div class="form-group">
                <label for="display-name" class="form-label"
                    >Display Name</label
                >
                <input
                    class="form-input"
                    type="text"
                    id="display-name"
                    placeholder="Nhập Display Name"
                />
            </div>
            <div class="form-group">
                <label for="email" class="form-label">Email</label>
                <input
                    class="form-input"
                    type="email"
                    id="email"
                    placeholder="Nhập Email"
                />
            </div>
            <div class="form-group">
                <label for="phone-number" class="form-label"
                    >Phone Number</label
                >
                <input
                    class="form-input"
                    type="phone"
                    id="phone-number"
                    placeholder="Nhập Phone Number"
                />
            </div>
            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <input
                    class="form-input"
                    type="password"
                    id="password"
                    placeholder="Nhập Password"
                />
            </div>
            <div class="form-group">
                <label for="confirm-password" class="form-label"
                    >ConFirm Password</label
                >
                <input
                    class="form-input"
                    type="password"
                    id="confirm-password"
                    placeholder="Nhập ConFirm Password"
                />
            </div>
            <div class="form-group">
                <label class="form-label">Gender</label>
                <label>
                    <input type="radio" name="gender" value="male" checked />
                    Male
                </label>
                <label>
                    <input type="radio" name="gender" value="female" /> Female
                </label>
                <label>
                    <input type="radio" name="gender" value="other" /> Other
                </label>
            </div>
            <div class="form-group">
                <label for="date-of-birth" class="form-label">
                    Date of birth
                </label>
                <input type="date" id="date-of-birth" />
            </div>
            <div class="form-group">
                <label for="address" class="form-label">Address</label>
                <input
                    class="form-input"
                    type="text"
                    id="address"
                    placeholder="Nhập Address"
                />
            </div>
            <div class="form-group">
                <label for="profile-picture" class="form-label"
                    >Profile Picture</label
                >
                <label for="profile-picture" class="form-avatar">
                    <img src="./img/images.png" alt="avatar" class="avatar" />
                </label>
                <input type="file" id="profile-picture" hidden />
            </div>
            <div class="form-group">
                <label class="form-label">Communication Preferences</label>
                <div class="form-options">
                    <label>
                        <input type="checkbox" name="option" /> Subscribe to
                        Newsletter
                    </label>
                    <label>
                        <input type="checkbox" name="option" /> Receive
                        Promotional Emails
                    </label>
                    <label>
                        <input type="checkbox" name="option" /> Get Product
                        Updates
                    </label>
                </div>
            </div>
            <div class="form-group form-footer">
                <button class="btn">Cancel</button>
                <button class="btn">Register</button>
            </div>
        </form>
    </body>
</html>
